name: mesmer_app
description: MESMER Digital Coaching and Monitoring Mobile Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.1

  # Local Database (Offline-First)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # Backend / Auth / Storage / Realtime
  supabase_flutter: ^2.5.6

  # Calendar & Scheduling
  table_calendar: ^3.1.2

  # Charts & Visualization
  fl_chart: ^0.68.0

  # PDF Generation & Printing
  pdf: ^3.10.8
  printing: ^5.13.1

  # Media Capture & File Handling
  image_picker: ^1.1.2
  file_picker: ^8.0.6
  flutter_image_compress: ^2.2.0
  video_compress: ^3.1.3

  # Push & Local Notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2

  # Network & Connectivity
  connectivity_plus: ^6.0.3

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  path: ^1.9.0
  timezone: ^0.9.4
  equatable: ^2.0.5
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.9
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
